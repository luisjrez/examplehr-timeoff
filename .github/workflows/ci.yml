name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  # The quality gate: nothing deploys unless ALL of this is green.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm format:check

      - name: ESLint (zero warnings)
        run: pnpm lint

      - name: TypeScript
        run: pnpm typecheck

      - name: Unit & integration tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Storybook interaction tests
        run: pnpm test:storybook

      # E2E runs against `next start` on the build above — no dev-mode
      # on-demand compilation, no cold-route flakes.
      - name: E2E (Playwright vs production server)
        run: pnpm test:e2e

      # Forensic evidence for the auto-filed regression issue: HTML report,
      # traces and videos of the failing specs.
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  deploy-storybook:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          # Chromatic needs full git history for baselines.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Publish Storybook to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          # Snapshots are deterministic (frozen clock + static story dates),
          # so a diff here means a REAL visual change: intentional ones get
          # accepted once in the Chromatic UI; regressions get caught.
          # exitZeroOnChanges keeps the pipeline green while review happens —
          # the Chromatic check itself carries the visual verdict.
          exitZeroOnChanges: true

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy to Vercel (production)
        run: |
          pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          # Vercel's upload API intermittently 500s (seen twice: issues #1, #2)
          # — retry the deploy with backoff before declaring a regression.
          for attempt in 1 2 3; do
            if pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi
            echo "Deploy attempt ${attempt} failed; retrying in $((attempt * 20))s…"
            sleep $((attempt * 20))
          done
          echo "All deploy attempts failed."
          exit 1

  # Senior-QA regression alerting: any failure on main auto-files a GitHub
  # issue with the diagnosis, the fix playbook and a copy-paste agent prompt.
  # Issues are deduped per failing-job set: repeats land as comments.
  regression-alert:
    runs-on: ubuntu-latest
    needs: [quality, deploy-storybook, deploy-vercel]
    if: always() && github.event_name == 'push' && contains(needs.*.result, 'failure')
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.runId;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}`;
            const sha = context.sha;
            const shortSha = sha.slice(0, 7);
            const commit = context.payload.head_commit ?? {};
            const commitMessage = (commit.message ?? "").split("\n")[0];
            const author = commit.author?.username ?? commit.author?.name ?? "unknown";

            // Which jobs/steps actually failed in this run?
            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: runId, per_page: 100,
            });
            const failedJobs = jobsData.jobs.filter((j) => j.conclusion === "failure");
            if (failedJobs.length === 0) return;

            const failedNames = failedJobs.map((j) => j.name).sort().join(", ");
            const jobDetails = failedJobs
              .map((j) => {
                const steps = (j.steps ?? [])
                  .filter((s) => s.conclusion === "failure")
                  .map((s) => `\`${s.name}\``)
                  .join(", ") || "(job-level failure)";
                return `- **${j.name}** → step(s): ${steps} — [logs](${j.html_url})`;
              })
              .join("\n");

            const reproduceByJob = {
              "quality": [
                "pnpm install",
                "pnpm format:check && pnpm lint && pnpm typecheck",
                "pnpm test                # domain invariants, data flows vs MSW, components",
                "pnpm test:storybook      # browser-mode interaction tests (every UI state)",
                "pnpm test:e2e            # Playwright vs real route handlers",
                "pnpm build",
              ],
              "deploy-storybook": [
                "pnpm build-storybook     # must build clean",
                "# then check the CHROMATIC_PROJECT_TOKEN secret and chromatic.com build logs",
              ],
              "deploy-vercel": [
                "pnpm build               # must build clean",
                "# then check secrets: VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID",
                "# manual deploy fallback: pnpm dlx vercel deploy --prod",
              ],
            };
            const reproduce = failedJobs
              .map((j) => `**${j.name}:**\n\`\`\`bash\n${(reproduceByJob[j.name] ?? ["# see job logs"]).join("\n")}\n\`\`\``)
              .join("\n\n");

            const agentPrompt = [
              `You are a development agent working on the ${owner}/${repo} repo (Next.js App Router + TanStack Query + Storybook).`,
              ``,
              `REGRESSION ON main — commit ${sha} ("${commitMessage}" by ${author}).`,
              `Failed jobs: ${failedNames}.`,
              `Run with logs and artifacts (playwright-report, traces, videos): ${runUrl}`,
              ``,
              `Project context:`,
              `- docs/TRD.md is the spec: two-layer model (confirmed layer in TanStack Query + holds overlay in Zustand), request FSM in src/domain/requestMachine.ts, post-write verification in src/data/submitFlow.ts, CAS-gated decisions in src/data/decideFlow.ts, mock HCM in src/mocks/hcmStore.ts (one brain, two transports: route handlers and MSW).`,
              `- Test matrix in README ("Test suite — what guards what"): every layer has its guard; do NOT weaken a test to make it green — a failing test describes the correct behavior.`,
              ``,
              `Instructions:`,
              `1. git checkout ${sha} and reproduce locally with the failed job's commands (see issue).`,
              `2. Isolate the layer: a failing domain property test means the bug is in the FSM/projection; a failing data test vs MSW means the flows; a failing story means a UI state's visual contract; a failing e2e means cross-layer wiring.`,
              `3. Fix with red-green-refactor. Hard rules: strict TypeScript with no any, no inline functions in JSX (jsx-no-bind), separated layers (domain without React, data without JSX, components without fetching), comments only for the why.`,
              `4. Before proposing the fix, verify the FULL gate: pnpm format:check && pnpm lint && pnpm typecheck && pnpm test && pnpm test:storybook && pnpm test:e2e && pnpm build.`,
              `5. If the failure is a deploy (not code), check secrets/configuration and document the root cause in the issue instead of touching code.`,
            ].join("\n");

            const body = [
              `## ❗ Problem`,
              ``,
              `Push [\`${shortSha}\`](${context.serverUrl}/${owner}/${repo}/commit/${sha}) ("${commitMessage}", @${author}) broke **main**.`,
              ``,
              jobDetails,
              ``,
              `📦 Forensic artifacts (Playwright HTML report, traces, videos): **Artifacts** tab of the [run](${runUrl}).`,
              ``,
              `## 🔬 How to reproduce`,
              ``,
              reproduce,
              ``,
              `## 🛠 How to fix`,
              ``,
              `1. Identify the exact step in the job logs (links above).`,
              `2. Reproduce locally on the broken commit: \`git checkout ${shortSha}\`.`,
              `3. The README test matrix says what each test layer guards — the kind of test that failed tells you where the bug lives. **Do not weaken the test.**`,
              `4. Fix with red-green-refactor and validate the full gate before pushing.`,
              `5. If it is a deploy failure (secrets/infra), fix the configuration and document the root cause here.`,
              ``,
              `## 🤖 Agent prompt (copy & paste)`,
              ``,
              "```",
              agentPrompt,
              "```",
            ].join("\n");

            // Dedupe: one open issue per failing-job set; repeats become comments.
            const titlePrefix = `🔴 Regression on main: ${failedNames}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "regression", per_page: 100,
            });
            const duplicate = existing.find((i) => i.title.startsWith(titlePrefix));

            if (duplicate) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: duplicate.number,
                body: `Still failing at [\`${shortSha}\`](${context.serverUrl}/${owner}/${repo}/commit/${sha}) — [run ${context.runNumber}](${runUrl}).`,
              });
              core.notice(`Commented on existing regression issue #${duplicate.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner, repo,
                title: `${titlePrefix} (run #${context.runNumber})`,
                body,
                labels: ["regression", "ci"],
              });
              core.notice(`Filed regression issue #${issue.number}`);
            }
